# ── Прозрачность ─────────────────────────────────────
#background_opacity 0.9
# background #1e1e2e
dynamic_background_opacity yes   # менять прозрачность на лету: Ctrl+Shift+A → M/L

# ── Шрифт ────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# ── Курсор ───────────────────────────────────────────
cursor_shape           beam
cursor_blink_interval  0.5

# ── Внешний вид ──────────────────────────────────────
hide_window_decorations yes
window_padding_width    10
placement_strategy      center

# ── Вкладки ──────────────────────────────────────────
tab_bar_style           powerline
tab_powerline_style     slanted

# ── Цвета (Catppuccin Mocha) ─────────────────────────
# foreground              #a8b0cc
# background              #1e1e2e
# color0  #363849
# color1  #c87a8a
# color2  #84b87e
# color3  #c9b48a
# color4  #6e93d6
# color5  #c49aba
# color6  #76b5a8
# color7  #9aa0b8
# color8  #46485a
# color9  #c87a8a
# color10 #84b87e
# color11 #c9b48a
# color12 #6e93d6
# color13 #c49aba
# color14 #76b5a8
# color15 #868caa


# BEGIN_KITTY_THEME
# Gruvbox Dark Hard
include current-theme.conf
# END_KITTY_THEME


# Увеличить размер шрифта
map ctrl+equal  change_font_size all +2.0
map ctrl+plus   change_font_size all +2.0

# Уменьшить размер шрифта
map ctrl+minus  change_font_size all -2.0

# Сбросить до стандартного размера
map ctrl+0      change_font_size all 0
